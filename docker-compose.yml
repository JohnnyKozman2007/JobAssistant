services:
  frontend:
    image: node:24-slim
    working_dir: /app
    ports:
      - "5173:5173"
    volumes:
      - ./Frontend:/app
      - vite_node_modules:/app/node_modules
    command: sh -lc "npm ci && npm run dev -- --host 0.0.0.0"

  agent:
    build:
      context: ./Agent
      dockerfile: Dockerfile
    working_dir: /app/Agent
    ports:
      - "8888:8888"
    volumes:
      - ./Agent:/app/Agent
    expose:
      - "8001"
    command:
      [
        "jupyter",
        "lab",
        "--ip=0.0.0.0",
        "--port",
        "8888",
        "--no-browser",
        "--allow-root",
      ]

  backend:
    build:
      context: ./BackEnd
      dockerfile: Dockerfile.dev
    ports:
      - 8000:8000
    volumes:
      - ./BackEnd:/app/BackEnd
    env_file:
      - .env
    environment:
      - AGENT_BASE_URL=${AGENT_BASE_URL}
    command: uvicorn BackEnd.app.main:app --host 0.0.0.0 --port 8000 --reload

volumes:
  vite_node_modules:
