services:
  frontend:
    image: node:24-slim
    working_dir: /app
    ports:
      - "5173:5173"
    volumes:
      - ./Frontend:/app
      - vite_node_modules:/app/node_modules
    command: sh -lc "npm ci && npm run dev -- --host 0.0.0.0"

  agent:
    build:
      context: ./Agent
      dockerfile: Dockerfile
    working_dir: /app/Agent
    ports:
      - 8888:8888
    volumes:
      - ./Agent:/app/Agent
    command:
      [
        "jupyter",
        "lab",
        "--ip=0.0.0.0",
        "--port",
        "8888",
        "--no-browser",
        "--allow-root",
      ]

volumes:
  vite_node_modules:
